<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1E2320 0%,#2E3830 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#F4F1F0}

button:hover{background:#3D8C2B}

function fromB64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u}
async function unlock(pwd){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(PAYLOAD.salt),iterations:250000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(PAYLOAD.iv)},k,fromB64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('b'),inp=document.getElementById('p'),err=document.getElementById('e');
  btn.disabled=true;btn.textContent='Desbloqueando...';err.textContent='';
  try{
    const html=await unlock(inp.value);
    document.open();document.write(html);document.close();
  }catch(ex){
    err.textContent='Senha incorreta';btn.disabled=false;btn.textContent='Desbloquear';inp.value='';inp.focus();
  }
});
